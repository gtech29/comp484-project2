<!DOCTYPE html>
<html>

<head>
  <title>Juan Rodriguez | Project 2</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <div class="navbar">
      <div class="nav-item">Welcome to Juan's GigaPet</div>
    </div>
  </header>

  <main class="page-wrapper">

    <div class="device-wrapper">

      <!-- screen -->
      <section class="screen">
        <img class="pet-image" src="./images/zorp-normal.png">
        <span class="pet-name"></span>
        <span class="pet-subtitle">ZORP</span>
        <div class="speech-bubble"></div>
      </section>

      <!-- stats -->
      <section class="stats-panel">

        <div class="stat-row">
          <span class="stat-label">HUNGER</span>
          <div class="stat-bar-bg">
            <div class="stat-bar-fill hunger-fill"></div>
          </div>
          <span class="stat-value hunger-val">0</span>
        </div>

        <div class="stat-row">
          <span class="stat-label">MOOD</span>
          <div class="stat-bar-bg">
            <div class="stat-bar-fill mood-fill"></div>
          </div>
          <span class="stat-value mood-val">0</span>
        </div>

        <div class="stat-row">
          <span class="stat-label">ENERGY</span>
          <div class="stat-bar-bg">
            <div class="stat-bar-fill energy-fill"></div>
          </div>
          <span class="stat-value energy-val">0</span>
        </div>

        <div class="stat-row">
          <span class="stat-label">AGE</span>
          <span class="stat-value age-val">0</span>
        </div>

      </section>

      <!-- buttons -->
      <section class="button-container">
        <button class="feed-button">FEED</button>
        <button class="play-button">PLAY</button>
        <button class="exercise-button">EXERCISE</button>
        <button class="sleep-button">SLEEP</button>
      </section>

      <!-- decorative dots -->
      <div class="device-dots">
        <span class="active"></span>
        <span class="active"></span>
      </div>

    </div>

  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

</body>

</html>
